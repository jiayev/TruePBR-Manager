name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags-ignore:
      - 'v*'

permissions:
  contents: write

jobs:
  prek:
    name: Pre-commit Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Auto-fix and push
        if: failure()
        uses: pre-commit-ci/lite-action@v1.1.0
        with:
          msg: "style: auto-fix pre-commit issues"

  version-sync:
    name: Verify Version Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check CMakeLists.txt and vcpkg.json versions match
        run: |
          cmake_ver=$(grep -oP 'project\(TruePBR-Manager\s+VERSION\s+\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          vcpkg_ver=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['version-string'])")
          echo "CMakeLists.txt version: $cmake_ver"
          echo "vcpkg.json version:     $vcpkg_ver"
          if [ "$cmake_ver" != "$vcpkg_ver" ]; then
            echo "::error::Version mismatch! CMakeLists.txt=$cmake_ver, vcpkg.json=$vcpkg_ver. Run: python scripts/bump_version.py <new_version>"
            exit 1
          fi
          echo "Versions are in sync."

  build-windows:
    name: Windows Build
    runs-on: windows-latest
    # Run in parallel with prek and version-sync — don't wait for them
    # If lint or version check fails, the overall CI still fails,
    # but the build starts immediately instead of waiting ~1-2 min.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          doNotCache: false
          vcpkgJsonGlob: '**/vcpkg.json'

      - name: Configure
        run: cmake --preset default

      - name: Build
        run: cmake --build --preset release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TruePBR-Manager-windows
          path: dist/TruePBR-Manager
          if-no-files-found: error
