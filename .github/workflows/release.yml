name: Auto Tag & Release

on:
  push:
    branches:
      - master
    paths:
      - 'CMakeLists.txt'
      - 'vcpkg.json'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release from current version (skip tag creation)'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: read    # needed to download artifacts from CI workflow

jobs:
  # ── Job 1: Detect version bump and create tag ─────────────
  auto-tag:
    name: Detect Version & Create Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.result.outputs.TAG }}
      version: ${{ steps.result.outputs.VERSION }}
      should_release: ${{ steps.result.outputs.SHOULD_RELEASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from CMakeLists.txt
        id: cmake_ver
        run: |
          ver=$(grep -oP 'project\(TruePBR-Manager\s+VERSION\s+\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          echo "VERSION=$ver" >> "$GITHUB_OUTPUT"
          echo "Detected CMake version: $ver"

      - name: Extract version from vcpkg.json
        id: vcpkg_ver
        run: |
          ver=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['version-string'])")
          echo "VERSION=$ver" >> "$GITHUB_OUTPUT"
          echo "Detected vcpkg version: $ver"

      - name: Verify versions are in sync
        run: |
          cmake_ver="${{ steps.cmake_ver.outputs.VERSION }}"
          vcpkg_ver="${{ steps.vcpkg_ver.outputs.VERSION }}"
          if [ "$cmake_ver" != "$vcpkg_ver" ]; then
            echo "::error::Version mismatch! CMakeLists.txt=$cmake_ver, vcpkg.json=$vcpkg_ver"
            exit 1
          fi
          echo "Versions are in sync: $cmake_ver"

      - name: Check if tag already exists
        id: check_tag
        run: |
          tag="v${{ steps.cmake_ver.outputs.VERSION }}"
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "EXISTS=true" >> "$GITHUB_OUTPUT"
            echo "Tag $tag already exists."
          else
            echo "EXISTS=false" >> "$GITHUB_OUTPUT"
            echo "Tag $tag does not exist, will create."
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.EXISTS == 'false'
        run: |
          tag="v${{ steps.cmake_ver.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Set outputs
        id: result
        run: |
          tag="v${{ steps.cmake_ver.outputs.VERSION }}"
          echo "TAG=$tag" >> "$GITHUB_OUTPUT"
          echo "VERSION=${{ steps.cmake_ver.outputs.VERSION }}" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.check_tag.outputs.EXISTS }}" == "false" ] || [ "${{ inputs.force_release }}" == "true" ]; then
            echo "SHOULD_RELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "SHOULD_RELEASE=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2: Wait for CI build, then publish release ────────
  publish-release:
    name: Publish Release
    needs: auto-tag
    if: needs.auto-tag.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      # Wait for the CI workflow's build job to finish (triggered by the same push)
      - name: Wait for CI build to complete
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'Windows Build'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success

      # Download the artifact produced by CI's build-windows job
      - name: Download build artifact from CI
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          commit: ${{ github.sha }}
          name: TruePBR-Manager-windows
          path: dist/TruePBR-Manager

      - name: Create release archive
        run: |
          tag="${{ needs.auto-tag.outputs.tag }}"
          archiveName="TruePBR-Manager-${tag}-windows-x64.zip"
          mkdir -p release
          cd dist/TruePBR-Manager
          zip -r "../../release/${archiveName}" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.auto-tag.outputs.tag }}
          name: TruePBR Manager ${{ needs.auto-tag.outputs.tag }}
          files: release/*.zip
          generate_release_notes: true
